<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="50%" stop-color="#16213e"/>
      <stop offset="100%" stop-color="#0f3460"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#46A19E"/>
      <stop offset="100%" stop-color="#5BC0BE"/>
    </linearGradient>
    <linearGradient id="beigeGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E6CFA1"/>
      <stop offset="100%" stop-color="#F0E3C8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle geometric pattern -->
  <g opacity="0.03">
    <line x1="0" y1="105" x2="1200" y2="105" stroke="#46A19E" stroke-width="1"/>
    <line x1="0" y1="210" x2="1200" y2="210" stroke="#46A19E" stroke-width="1"/>
    <line x1="0" y1="315" x2="1200" y2="315" stroke="#46A19E" stroke-width="1"/>
    <line x1="0" y1="420" x2="1200" y2="420" stroke="#46A19E" stroke-width="1"/>
    <line x1="0" y1="525" x2="1200" y2="525" stroke="#46A19E" stroke-width="1"/>
  </g>

  <!-- Decorative accent bar at top -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Logo mark: three geometric diamonds -->
  <g transform="translate(300, 140) scale(2.5)" filter="url(#glow)">
    <!-- Diamond 1 (top-left, dark/turquoise) -->
    <path fill="#46A19E" d="M61.55,115.95c-13.45,7.77-39.71,22.92-53.16,30.69C4.66,148.8,0,146.1,0,141.8v-61.38C0,76.11,4.66,73.42,8.39,75.57l53.16,30.69c3.73,2.15,3.73,7.54,0,9.69Z"/>
    <!-- Diamond 2 (top-right, turquoise) -->
    <path fill="#46A19E" d="M78.33,41.14c13.45,7.77,39.71,22.92,53.16,30.69,3.73,2.15,8.39-.54,8.39-4.85V5.6c0-4.31-4.66-7-8.39-4.85l-53.16,30.69c-3.73,2.15-3.73,7.54,0,9.69Z"/>
    <!-- Diamond 3 (bottom, beige) -->
    <path fill="#E6CFA1" d="M137.09,93.91L8.39,19.61c-3.73-2.15-8.39.54-8.39,4.85v24.38c0,2,1.07,3.85,2.8,4.85l128.69,74.3c3.73,2.15,8.39-.54,8.39-4.85v-24.38c0-2-1.07-3.85-2.8-4.85Z"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(300, 200) scale(2.5)">
    <!-- Main wordmark paths (Staffinity.ai) -->
    <g>
      <!-- S t a f f i n i t y . a i -->
      <text x="95" y="95" font-family="'Helvetica Neue', Arial, sans-serif" font-size="36" font-weight="700" letter-spacing="2" fill="#ffffff">Staffinity</text>
      <text x="95" y="125" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="300" letter-spacing="4" fill="#46A19E">.ai</text>
    </g>
  </g>

  <!-- Tagline -->
  <text x="600" y="480" font-family="'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" letter-spacing="2" fill="#E6CFA1" text-anchor="middle">Innovative IT-Staffing &amp; Software Solutions</text>

  <!-- Bottom decorative accent -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#accent)"/>

  <!-- URL at bottom -->
  <text x="600" y="570" font-family="'Courier New', monospace" font-size="18" font-weight="400" letter-spacing="4" fill="#46A19E" opacity="0.8" text-anchor="middle">staffinity.ai</text>
</svg>
