backend:
  name: github
  repo: himu-staffinity/staffinity-clone
  branch: main
  site_domain: http://localhost:8788
  base_url: http://localhost:8788
  auth_endpoint: /api/auth

media_folder: public/assets/images
public_folder: /assets

i18n:
  structure: multiple_folders
  locales: [de, en]
  default_locale: de

collections:
  - label: Solutions
    name: solutions
    folder: src/content/solutions
    create: true
    i18n: true
    slug: "{{slug}}"
    fields:
      - { label: Title, name: title, widget: string, i18n: true }
      - { label: Subtitle, name: subtitle, widget: list, i18n: true }
      - { label: Icon, name: icon, widget: string }
      - { label: Summary, name: summary, widget: markdown, required: false, i18n: true }
      - { label: Primary Question, name: primary_question, widget: string, required: false, i18n: true }
      - { label: Primary Answer, name: primary_answer, widget: markdown, required: false, i18n: true }
      - label: Details
        name: details
        widget: list
        required: false
        i18n: true
        fields:
          - { label: Question, name: question, widget: string }
          - label: Answer
            name: answer
            widget: list
            fields:
              - { label: Name, name: name, widget: string }
              - { label: Description, name: description, widget: markdown }
      - { label: Layout, name: layout, widget: string, required: false }
      - { label: Permalink, name: permalink, widget: string, required: false }

  - label: Authors
    name: authors
    folder: src/content/authors
    create: true
    i18n: true
    slug: "{{slug}}"
    fields:
      - { label: Name, name: name, widget: string, i18n: true }
      - { label: Job, name: job, widget: string, i18n: true }
      - { label: Description, name: description, widget: markdown, i18n: true }
      - { label: Avatar, name: avatar, widget: image, i18n: duplicate }
      - { label: Linkedin, name: linkedin, widget: string, required: false, i18n: duplicate }

  - label: Stories
    name: stories
    folder: src/content/stories
    i18n: true
    create: true
    slug: "{{slug}}"
    fields:
      - { label: Title, name: title, widget: string, i18n: true }

  - label: Pages
    name: pages
    files:
      - label: About Page (English)
        name: about-en
        file: src/content/pages/en/about.md
        create: false
        slug: "{{slug}}"
        i18n: true
        fields:
          - { label: Title, name: title, widget: string, i18n: true }
          - { label: Meta Title, name: meta_title, widget: string, i18n: true, required: false }
          - { label: More About Us, name: more_about_us_text, widget: string, i18n: true, required: false }
          - { label: Body, name: body, widget: markdown, i18n: true, required: false }

      - label: About Page (German)
        name: about-de
        file: src/content/pages/de/about.md
        create: false
        slug: "{{slug}}"
        i18n: true
        fields:
          - { label: Titel, name: title, widget: string, i18n: true }
          - { label: Meta-Titel, name: meta_title, widget: string, i18n: true, required: false }
          - { label: Mehr über uns, name: more_about_us_text, widget: string, i18n: true, required: false }
          - { label: Inhalt, name: body, widget: markdown, i18n: true, required: false }

      - label: Work Page (English)
        name: work-en
        file: src/content/pages/en/work.md
        create: false
        slug: "{{slug}}"
        i18n: true
        fields:
          - { label: Title, name: title, widget: string, i18n: true }
          - { label: Meta Title, name: meta_title, widget: string, i18n: true, required: false }
          - { label: Main Title, name: maintitle, widget: string, i18n: true, required: false }
          - { label: Collaboration Alt, name: collab_alt, widget: string, i18n: true, required: false }
          - label: FAQ
            name: faq
            widget: list
            required: false
            i18n: true
            fields:
              - { label: Question, name: question, widget: string }
              - { label: Answer, name: answer, widget: text }
          - { label: Body, name: body, widget: markdown, i18n: true, required: false }

      - label: Work Page (German)
        name: work-de
        file: src/content/pages/de/work.md
        create: false
        slug: "{{slug}}"
        i18n: true
        fields:
          - { label: Titel, name: title, widget: string, i18n: true }
          - { label: Meta-Titel, name: meta_title, widget: string, i18n: true, required: false }
          - { label: Haupttitel, name: maintitle, widget: string, i18n: true, required: false }
          - { label: Zusammenarbeit Alt, name: collab_alt, widget: string, i18n: true, required: false }
          - label: FAQ
            name: faq
            widget: list
            required: false
            i18n: true
            fields:
              - { label: Frage, name: question, widget: string }
              - { label: Antwort, name: answer, widget: text }
          - { label: Inhalt, name: body, widget: markdown, i18n: true, required: false }

      - label: Impressum (English)
        name: impressum-en
        file: src/content/pages/en/impressum.md
        create: false
        slug: "{{slug}}"
        i18n: true
        fields:
          - { label: Title, name: title, widget: string, i18n: true }
          - { label: Meta Title, name: meta_title, widget: string, i18n: true, required: false }
          - { label: Body, name: body, widget: markdown, i18n: true, required: false }

      - label: Impressum (German)
        name: impressum-de
        file: src/content/pages/de/impressum.md
        create: false
        slug: "{{slug}}"
        i18n: true
        fields:
          - { label: Titel, name: title, widget: string, i18n: true }
          - { label: Meta-Titel, name: meta_title, widget: string, i18n: true, required: false }
          - { label: Inhalt, name: body, widget: markdown, i18n: true, required: false }

      - label: Privacy Policy (English)
        name: privacy_policy-en
        file: src/content/pages/en/privacy-policy.md
        create: false
        slug: "{{slug}}"
        i18n: true
        fields:
          - { label: Title, name: title, widget: string, i18n: true }
          - { label: Meta Title, name: meta_title, widget: string, i18n: true, required: false }
          - { label: Body, name: body, widget: markdown, i18n: true, required: false }

      - label: Datenschutzerklärung
        name: privacy_policy-de
        file: src/content/pages/de/privacy-policy.md
        create: false
        slug: "{{slug}}"
        i18n: true
        fields:
          - { label: Titel, name: title, widget: string, i18n: true }
          - { label: Meta-Titel, name: meta_title, widget: string, i18n: true, required: false }
          - { label: Inhalt, name: body, widget: markdown, i18n: true, required: false }
